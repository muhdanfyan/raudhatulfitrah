  <script>
    // System Diagnostics & Cache Busting
    console.log('%c[Pisantri] System Initialization...', 'color: #1e40af; font-weight: bold;');

    // Force check for Service Worker updates on load
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.ready.then(registration => {
        registration.update().then(() => {
          console.log('[Pisantri] Service Worker update check completed.');
        });
      });

      // Clear legacy caches if needed (versioning)
      const APP_VERSION = '1.0.5';
      const lastVersion = localStorage.getItem('pisantri_version');
      if (lastVersion !== APP_VERSION) {
        console.warn('[Pisantri] New version detected, clearing stale caches...');
        caches.keys().then(names => {
          for (let name of names) caches.delete(name);
        });
        localStorage.setItem('pisantri_version', APP_VERSION);
      }
    }
  </script>
