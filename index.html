        registration.update().then(() => {

        });
      });

      // Clear legacy caches if needed (versioning)
      const APP_VERSION = '1.0.0';
      const lastVersion = localStorage.getItem('raudhatulfitrah_version');
      if (lastVersion !== APP_VERSION) {
        console.warn('[Raudhatul Fitrah] New version detected, clearing stale caches...');
        caches.keys().then(names => {
          for (let name of names) caches.delete(name);
        });
        localStorage.setItem('raudhatulfitrah_version', APP_VERSION);
      }
    }
