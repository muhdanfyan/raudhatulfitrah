<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Tidak Ditemukan - Pondok Informatika</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 500px; }
        h1 { font-size: 120px; font-weight: bold; margin-bottom: 10px; opacity: 0.9; }
        h2 { font-size: 24px; margin-bottom: 20px; }
        p { font-size: 16px; opacity: 0.8; margin-bottom: 30px; line-height: 1.6; }
        .links { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        a {
            display: inline-block;
            padding: 12px 24px;
            background: white;
            color: #1e3a8a;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        a:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        a.secondary { background: transparent; color: white; border: 2px solid white; }
        a.secondary:hover { background: white; color: #1e3a8a; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Halaman Tidak Ditemukan</h2>
        <p>Maaf, halaman yang Anda cari tidak ditemukan. Mungkin halaman telah dipindahkan atau URL salah.</p>
        <div class="links">
            <a href="/">Beranda</a>
            <a href="/ppdb" class="secondary">Daftar PPDB</a>
            <a href="/tulisan" class="secondary">Tulisan Santri</a>
        </div>
    </div>
</body>
</html>
